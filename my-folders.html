<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileBox - Quick Access</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>

        body{font-family:"Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;background:#f5f7fa;min-height:100vh}
        .navbar{position:fixed;top:0;left:0;right:0;height:60px;background:#fff;box-shadow:0 2px 12px 0 rgba(0,0,0,.1);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:100}
        .nav-logo{font-size:20px;font-weight:600;color:#409EFF;display:flex;align-items:center;gap:8px}
        .nav-logo i{font-size:26px}
        .nav-links{display:flex;flex-direction:column;gap:2px}
        .nav-links a{color:#606266;text-decoration:none;font-size:14px;padding:10px 20px;border-radius:6px;transition:all .3s;cursor:pointer;white-space:nowrap}
        .nav-links a:hover,.nav-links a.active{color:#409EFF;background:#ecf5ff}
        .nav-right{display:flex;align-items:center;gap:12px}
        .lang-switcher{cursor:pointer;padding:6px 12px;border-radius:4px;font-size:13px;color:#606266;background:#f5f7fa;transition:all .3s;border:none}
        .lang-switcher:hover{background:#ecf5ff;color:#409EFF}
        .layout{display:flex;margin-top:60px;min-height:calc(100vh - 60px)}
        .sidebar{width:180px;position:fixed;top:60px;left:0;bottom:0;background:#fff;border-right:1px solid #ebeef5;padding:20px 12px;overflow-y:auto;z-index:90;display:flex;flex-direction:column}
        .sidebar-nav{flex:1;overflow-y:auto}
        .sidebar-bottom{padding-top:16px;border-top:1px solid #ebeef5;margin-top:12px}
        .sidebar-bottom .el-button{width:100%}
        .main{flex:1;margin-left:180px;padding:40px 40px 60px;max-width:calc(100% - 180px)}
        .page-header{text-align:center;margin-bottom:40px}
        .page-header h1{font-size:32px;font-weight:500;color:#303133;margin-bottom:8px}
        .page-header p{font-size:14px;color:#909399}
        .category{margin-bottom:40px;background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 12px 0 rgba(0,0,0,.05)}
        .category-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #ebeef5}
        .category-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#ecf5ff;border-radius:8px;color:#409EFF;font-size:22px}
        .category-title{font-size:16px;font-weight:600;color:#303133;flex:1}
        .category-actions{display:flex;gap:6px;opacity:0;transition:opacity .3s}
        .category:hover .category-actions{opacity:1}
        .btn-sort{width:28px;height:28px;border:none;background:#f5f7fa;border-radius:4px;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;color:#909266}
        .btn-sort:hover{color:#fff;background:#409EFF}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
        .folder-card{cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;padding:20px 12px 16px;background:#fff;border:1px solid #ebeef5;border-radius:8px}
        .folder-card:hover{border-color:#409EFF;box-shadow:0 4px 16px 0 rgba(64,158,255,.15);transform:translateY(-2px)}
        .folder-card:hover .card-actions{opacity:1}
        .folder-card:hover .folder-icon{transform:scale(1.05)}
        .folder-icon{font-size:42px;color:#409EFF;margin-bottom:12px;transition:transform .3s;display:flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:12px;overflow:hidden;background:#f5f7fa}
        .folder-icon img{width:100%;height:100%;object-fit:cover}
        .folder-icon i{font-size:28px}
        .folder-name{font-size:14px;font-weight:500;color:#303133;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
        .folder-path{font-size:12px;color:#909399;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
        .card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .3s}
        .btn-icon{width:28px;height:28px;border:none;background:#f5f7fa;border-radius:4px;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;color:#909399}
        .btn-icon:hover{color:#fff}
        .btn-icon.edit:hover{background:#67C23A}
        .btn-icon.del:hover{background:#F56C6C}
        .folder-card-add{cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;border:2px dashed #dcdfe6;border-radius:8px;min-height:136px;background:#fafafa}
        .folder-card-add:hover{border-color:#409EFF;background:#ecf5ff}
        .add-icon{font-size:32px;color:#c0c4cc;margin-bottom:8px;transition:all .3s}
        .folder-card-add:hover .add-icon{color:#409EFF}
        .add-text{font-size:13px;color:#909399}
        .icon-picker{display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;padding:10px;border:1px solid #dcdfe6;border-radius:4px;background:#fff}
        .icon-option{width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;transition:all .2s;border:2px solid transparent;background:#f5f7fa;font-size:20px;color:#606266}
        .icon-option:hover{background:#ecf5ff;border-color:#409EFF;color:#409EFF}
        .icon-option.selected{border-color:#409EFF;background:#ecf5ff;color:#409EFF}
        .selected-icon{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;color:#606266}
        .selected-icon i{font-size:24px;color:#409EFF}
        .cover-uploader{border:2px dashed #dcdfe6;border-radius:8px;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;width:100px;height:100px;display:flex;align-items:center;justify-content:center;background:#fafafa}
        .cover-uploader:hover{border-color:#409EFF;background:#ecf5ff}
        .cover-uploader .el-icon-plus{font-size:28px;color:#8c939d}
        .cover-preview{width:100%;height:100%;object-fit:cover;border-radius:6px}
        .cover-actions{position:absolute;top:4px;right:4px;display:flex;gap:4px}
        .cover-action-btn{width:24px;height:24px;border:none;background:rgba(0,0,0,.5);border-radius:4px;cursor:pointer;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .cover-action-btn:hover{background:rgba(0,0,0,.7)}
        .upload-tip{font-size:12px;color:#909399;margin-top:6px}
        .cover-section{margin-bottom:15px}
        .cover-label{font-size:14px;color:#606266;margin-bottom:8px;display:block}
        .footer{text-align:center;padding:24px;color:#909399;font-size:12px}
        @media(max-width:900px){.sidebar{display:none}.main{margin-left:0;max-width:100%;padding:80px 20px 40px}.navbar{padding:0 20px}.page-header h1{font-size:26px}.category{padding:16px}}
        @media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr);gap:12px}.folder-icon{width:56px;height:56px}.folder-icon i{font-size:24px}.folder-card{padding:16px 10px 12px}}

</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-logo"><i class="fa-solid fa-box-archive"></i> FileBox</div>
        <div class="nav-right">
            <button class="lang-switcher" @click="toggleLang">{{lang==='zh'?'EN':'中文'}}</button>
        </div>
    </nav>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-nav">
                <div class="nav-links" id="navLinks"></div>
            </div>
            <div class="sidebar-bottom">
                <el-button type="primary" size="small" icon="el-icon-plus" @click="openAddCategoryModal">{{t('addCategory')}}</el-button>
            </div>
        </aside>
        <div class="main">
            <div class="page-header">
                <h1>{{t('title')}}</h1>
                <p>{{t('subtitle')}}</p>
            </div>
            <div id="content"></div>
        </div>
    </div>
    <div class="footer">FILEBOX · QUICK ACCESS</div>

    <!-- 分类弹窗 -->
    <el-dialog :title="categoryDialogTitle" :visible.sync="categoryDialogVisible" width="460px" :close-on-click-modal="false">
        <el-form label-position="top">
            <el-form-item :label="t('categoryName')">
                <el-input v-model="categoryForm.name" :placeholder="t('categoryPlaceholder')"></el-input>
            </el-form-item>
            <el-form-item :label="t('selectIcon')">
                <div class="selected-icon">{{t('selected')}}：<i :class="categoryForm.icon"></i></div>
                <div class="icon-picker">
                    <div v-for="ic in iconList" :key="ic" class="icon-option" :class="{selected:categoryForm.icon===ic}" @click="categoryForm.icon=ic">
                        <i :class="ic"></i>
                    </div>
                </div>
            </el-form-item>
        </el-form>
        <div slot="footer">
            <el-button @click="categoryDialogVisible=false">{{t('cancel')}}</el-button>
            <el-button type="danger" v-if="editingCatIdx!==-1" @click="deleteCategory" style="margin-right:auto">{{t('delete')}}</el-button>
            <el-button type="primary" @click="saveCategory">{{t('save')}}</el-button>
        </div>
    </el-dialog>

    <!-- 文件夹弹窗 -->
    <el-dialog :title="folderDialogTitle" :visible.sync="folderDialogVisible" width="480px" :close-on-click-modal="false">
        <el-form label-position="top">
            <el-form-item :label="t('belongCategory')">
                <el-select v-model="folderForm.categoryIdx" style="width:100%">
                    <el-option v-for="(cat,idx) in categories" :key="idx" :label="cat.category" :value="idx"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item :label="t('folderName')">
                <el-input v-model="folderForm.name" :placeholder="t('folderPlaceholder')"></el-input>
            </el-form-item>
            <el-form-item :label="t('folderPath')">
                <el-input v-model="folderForm.path" :placeholder="t('pathPlaceholder')">
                    <el-button slot="append" @click="browseFolder"><i class="fa-solid fa-folder-open"></i> {{t('browse')}}</el-button>
                </el-input>
                <div style="font-size:12px;color:#909399;margin-top:6px">{{t('pathTip')}}</div>
            </el-form-item>
            <el-form-item :label="t('coverImage')">
                <div class="cover-section">
                    <div class="cover-uploader" @click="uploadCover" v-if="!folderForm.cover">
                        <i class="el-icon-plus"></i>
                    </div>
                    <div style="position:relative;width:100px;height:100px;" v-else>
                        <img :src="folderForm.cover" class="cover-preview">
                        <div class="cover-actions">
                            <button class="cover-action-btn" @click="removeCover" :title="t('delete')"><i class="el-icon-delete"></i></button>
                        </div>
                    </div>
                    <div class="upload-tip">{{t('uploadTip')}}</div>
                </div>
            </el-form-item>
            <el-form-item :label="t('selectIcon')+' ('+t('iconWhenNoCover')+')'">
                <div class="selected-icon">{{t('selected')}}：<i :class="folderForm.icon"></i></div>
                <div class="icon-picker">
                    <div v-for="ic in iconList" :key="ic" class="icon-option" :class="{selected:folderForm.icon===ic}" @click="folderForm.icon=ic">
                        <i :class="ic"></i>
                    </div>
                </div>
            </el-form-item>
        </el-form>
        <div slot="footer">
            <el-button @click="folderDialogVisible=false">{{t('cancel')}}</el-button>
            <el-button type="danger" v-if="editingFolderIdx!==-1" @click="deleteFolder" style="margin-right:auto">{{t('delete')}}</el-button>
            <el-button type="primary" @click="saveFolder">{{t('save')}}</el-button>
        </div>
    </el-dialog>
    <input type="file" ref="coverInput" style="display:none" accept="image/*" @change="handleCoverChange">
</div>

            'fa-solid fa-tags','fa-solid fa-tag','fa-solid fa-certificate','fa-solid fa-circle-info',
            'fa-solid fa-triangle-exclamation','fa-solid fa-circle-exclamation','fa-solid fa-shield',
            'fa-solid fa-leaf','fa-solid fa-seedling','fa-solid fa-tree',
            'fa-solid fa-gamepad','fa-solid fa-chess','fa-solid fa-puzzle-piece',
            'fa-solid fa-bicycle','fa-solid fa-car','fa-solid fa-bus','fa-solid fa-plane','fa-solid fa-ship','fa-solid fa-train',
            'fa-solid fa-mug-hot','fa-solid fa-utensils','fa-solid fa-pizza-slice',
            'fa-solid fa-briefcase','fa-solid fa-id-card','fa-solid fa-address-book',
            'fa-solid fa-sticky-note','fa-solid fa-note-sticky','fa-solid fa-thumbtack',
            'fa-solid fa-pen-ruler','fa-solid fa-ruler-combined',
            'fa-solid fa-filter','fa-solid fa-sort','fa-solid fa-arrow-up','fa-solid fa-arrow-down',
            'fa-solid fa-arrow-left','fa-solid fa-arrow-right',
            'fa-solid fa-expand','fa-solid fa-compress','fa-solid fa-maximize','fa-solid fa-minimize',
            'fa-solid fa-check-double','fa-solid fa-spell-check',
            'fa-solid fa-bug','fa-solid fa-spider','fa-solid fa-robot',
            'fa-solid fa-brain','fa-solid fa-hand','fa-solid fa-handshake',
            'fa-solid fa-droplet','fa-solid fa-fire-flame-curved',
            'fa-solid fa-sd-card','fa-solid fa-sim-card'
        ],
        defaultData: [
            { category:"系统默认", icon:"fa-solid fa-display", folders:[
                {name:"文档",path:"C:/Users/用户/Documents",icon:"fa-solid fa-file-lines"},
                {name:"下载",path:"C:/Users/用户/Downloads",icon:"fa-solid fa-download"},
                {name:"桌面",path:"C:/Users/用户/Desktop",icon:"fa-solid fa-desktop"},
                {name:"图片",path:"C:/Users/用户/Pictures",icon:"fa-solid fa-image"},
                {name:"音乐",path:"C:/Users/用户/Music",icon:"fa-solid fa-music"},
                {name:"视频",path:"C:/Users/用户/Videos",icon:"fa-solid fa-video"}
            ]},
            { category:"工作开发", icon:"fa-solid fa-laptop-code", folders:[
                {name:"项目代码",path:"C:/Users/用户/Documents/Projects",icon:"fa-solid fa-code"},
                {name:"工作文件",path:"C:/Users/用户/Documents/Work",icon:"fa-solid fa-briefcase"},
                {name:"GitHub",path:"C:/Users/用户/Documents/GitHub",icon:"fa-brands fa-github"}
            ]},
            { category:"个人存储", icon:"fa-solid fa-box-archive", folders:[
                {name:"备份",path:"D:/Backup",icon:"fa-solid fa-cloud-arrow-up"},
                {name:"学习资料",path:"D:/Study",icon:"fa-solid fa-book-open"}
            ]},
            { category:"其他", icon:"fa-solid fa-folder", folders:[
                {name:"临时文件",path:"C:/Users/用户/AppData/Local/Temp",icon:"fa-solid fa-file-circle-question"}
            ]}
        ],
        defaultDataEn: [
            { category:"System", icon:"fa-solid fa-display", folders:[
                {name:"Documents",path:"C:/Users/User/Documents",icon:"fa-solid fa-file-lines"},
                {name:"Downloads",path:"C:/Users/User/Downloads",icon:"fa-solid fa-download"},
                {name:"Desktop",path:"C:/Users/User/Desktop",icon:"fa-solid fa-desktop"},
                {name:"Pictures",path:"C:/Users/User/Pictures",icon:"fa-solid fa-image"},
                {name:"Music",path:"C:/Users/User/Music",icon:"fa-solid fa-music"},
                {name:"Videos",path:"C:/Users/User/Videos",icon:"fa-solid fa-video"}
            ]},
            { category:"Development", icon:"fa-solid fa-laptop-code", folders:[
                {name:"Projects",path:"C:/Users/User/Documents/Projects",icon:"fa-solid fa-code"},
                {name:"Work",path:"C:/Users/User/Documents/Work",icon:"fa-solid fa-briefcase"},
                {name:"GitHub",path:"C:/Users/User/Documents/GitHub",icon:"fa-brands fa-github"}
            ]},
            { category:"Storage", icon:"fa-solid fa-box-archive", folders:[
                {name:"Backup",path:"D:/Backup",icon:"fa-solid fa-cloud-arrow-up"},
                {name:"Study",path:"D:/Study",icon:"fa-solid fa-book-open"}
            ]},
            { category:"Others", icon:"fa-solid fa-folder", folders:[
                {name:"Temp",path:"C:/Users/User/AppData/Local/Temp",icon:"fa-solid fa-file-circle-question"}
            ]}
        ],
        categories: [],
        categoryDialogVisible: false, categoryDialogTitle: '',
        editingCatIdx: -1, categoryForm: { name:'', icon:'fa-solid fa-folder' },
        folderDialogVisible: false, folderDialogTitle: '',
        editingCatIdx_f: -1, editingFolderIdx: -1,
        folderForm: { categoryIdx:0, name:'', path:'', icon:'fa-solid fa-folder', cover:'' }
    },
    mounted() {
        const savedLang = localStorage.getItem('filebox_lang');
        if (savedLang && (savedLang === 'zh' || savedLang === 'en')) {
            this.lang = savedLang;
        }
        this.loadData(); this.renderNav(); this.renderContent(); this.updateScrollSpy();
    },
    methods: {
        t(key) {
            return i18n[this.lang][key] || key;
        },
        toggleLang() {
            this.lang = this.lang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('filebox_lang', this.lang);
            this.loadData();
            this.renderNav();
            this.renderContent();
        },
        loadData() {
            const s = localStorage.getItem('my_folders_data_v2');
            if (s) { try { this.categories = JSON.parse(s); return; } catch(e){} }
            this.categories = JSON.parse(JSON.stringify(this.lang === 'en' ? this.defaultDataEn : this.defaultData));
        },
        saveData() { localStorage.setItem('my_folders_data_v2', JSON.stringify(this.categories)); },
        renderNav() {
            const el = document.getElementById('navLinks'); if(!el) return; el.innerHTML = '';
            this.categories.forEach((g,i) => {
                const a = document.createElement('a');
                a.textContent = g.category; a.href = '#cat-'+i;
                if(i===0) a.classList.add('active');
                a.onclick = e => { e.preventDefault(); document.getElementById('cat-'+i).scrollIntoView({behavior:'smooth'}); };
                el.appendChild(a);
            });
        },
        renderContent() {
            const el = document.getElementById('content'); if(!el) return; el.innerHTML = '';
            this.categories.forEach((group,ci) => {
                const sec = document.createElement('div');
                sec.className = 'category'; sec.id = 'cat-'+ci;
                sec.innerHTML = '<div class="category-header"><div class="category-icon"><i class="'+group.icon+'"></i></div><span class="category-title">'+group.category+'</span><div class="category-actions"><button class="btn-sort" data-a="sf" data-i="'+ci+'" title="'+this.t('sortByName')+'"><i class="fa-solid fa-arrow-down-a-z"></i></button><button class="btn-icon edit" data-a="ec" data-i="'+ci+'"><i class="fa-solid fa-pen"></i></button><button class="btn-icon del" data-a="dc" data-i="'+ci+'"><i class="fa-solid fa-trash-can"></i></button></div></div>';
                const grid = document.createElement('div'); grid.className = 'grid';
                group.folders.forEach((f,fi) => {
                    const card = document.createElement('div'); card.className = 'folder-card'; card.title = f.path;
                    card.onclick = e => { if(!e.target.closest('.card-actions')) this.openFolder(ci,fi); };
                    const iconHtml = f.cover 
                        ? '<div class="folder-icon"><img src="'+f.cover+'"></div>'
                        : '<div class="folder-icon"><i class="'+f.icon+'"></i></div>';
                    card.innerHTML = '<div class="card-actions"><button class="btn-icon edit" data-a="ef" data-c="'+ci+'" data-f="'+fi+'"><i class="fa-solid fa-pen"></i></button><button class="btn-icon del" data-a="df" data-c="'+ci+'" data-f="'+fi+'"><i class="fa-solid fa-trash-can"></i></button></div>'+iconHtml+'<div class="folder-name">'+f.name+'</div><div class="folder-path">'+(f.path.split('/').pop()||f.path.split('\\').pop())+'</div>';
                    grid.appendChild(card);
                });
                const add = document.createElement('div'); add.className = 'folder-card-add';
                add.onclick = () => this.openAddFolderModal(ci);
                add.innerHTML = '<div class="add-icon"><i class="fa-solid fa-plus"></i></div><div class="add-text">'+this.t('addFolder')+'</div>';
                grid.appendChild(add);
                sec.appendChild(grid); el.appendChild(sec);
            });
            el.querySelectorAll('[data-a]').forEach(btn => {
                btn.onclick = e => {
                    e.stopPropagation();
                    const a=btn.dataset.a, c=parseInt(btn.dataset.c), f=btn.dataset.f!==undefined?parseInt(btn.dataset.f):null, i=parseInt(btn.dataset.i);
                    if(a==='ec') this.openEditCategoryModal(i);
                    else if(a==='dc') this.confirmDeleteCategory(i);
                    else if(a==='ef') this.openEditFolderModal(c,f);
                    else if(a==='df') this.confirmDeleteFolder(c,f);
                    else if(a==='sf') this.sortFolders(i);
                };
            });
        },
        openAddCategoryModal() { 
            this.editingCatIdx=-1; 
            this.categoryDialogTitle=this.t('add')+this.t('categoryName'); 
            this.categoryForm={name:'',icon:'fa-solid fa-folder'}; 
            this.categoryDialogVisible=true; 
        },
        sortFolders(ci) {
            const folders = this.categories[ci].folders;
            const btn = document.querySelector('[data-a="sf"][data-i="'+ci+'"] i');
            const isAsc = btn && btn.classList.contains('fa-arrow-down-a-z');
            folders.sort((a, b) => isAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
            this.saveData(); this.renderContent();
        },
        openEditCategoryModal(i) { 
            this.editingCatIdx=i; 
            this.categoryDialogTitle=this.t('edit')+this.t('categoryName'); 
            this.categoryForm={name:this.categories[i].category,icon:this.categories[i].icon||'fa-solid fa-folder'}; 
            this.categoryDialogVisible=true; 
        },
        saveCategory() {
            if(!this.categoryForm.name.trim()){this.$message.warning(this.t('inputCategoryName'));return;}
            if(this.editingCatIdx===-1) this.categories.push({category:this.categoryForm.name,icon:this.categoryForm.icon,folders:[]});
            else { this.categories[this.editingCatIdx].category=this.categoryForm.name; this.categories[this.editingCatIdx].icon=this.categoryForm.icon; }
            this.saveData(); this.renderNav(); this.renderContent(); this.categoryDialogVisible=false; this.$message.success(this.t('saveSuccess'));
        },
        deleteCategory() {
            this.$confirm(this.t('deleteCategoryConfirm').replace('{name}', this.categories[this.editingCatIdx].category),this.t('prompt'),{confirmButtonText:this.t('confirm'),cancelButtonText:this.t('cancel'),type:'warning'}).then(()=>{
                this.categories.splice(this.editingCatIdx,1); this.saveData(); this.renderNav(); this.renderContent(); this.categoryDialogVisible=false; this.$message.success(this.t('deleteSuccess'));
            });
        },
        confirmDeleteCategory(i) {
            this.$confirm(this.t('deleteCategoryConfirm').replace('{name}', this.categories[i].category),this.t('prompt'),{confirmButtonText:this.t('confirm'),cancelButtonText:this.t('cancel'),type:'warning'}).then(()=>{
                this.categories.splice(i,1); this.saveData(); this.renderNav(); this.renderContent(); this.$message.success(this.t('deleteSuccess'));
            });
        },
        openAddFolderModal(ci) { 
            this.editingCatIdx_f=ci; 
            this.editingFolderIdx=-1; 
            this.folderDialogTitle=this.t('add')+this.t('folderName'); 
            this.folderForm={categoryIdx:ci,name:'',path:'',icon:'fa-solid fa-folder',cover:''}; 
            this.folderDialogVisible=true; 
        },
        openEditFolderModal(ci,fi) { 
            this.editingCatIdx_f=ci; 
            this.editingFolderIdx=fi; 
            const f=this.categories[ci].folders[fi]; 
            this.folderDialogTitle=this.t('edit')+this.t('folderName'); 
            this.folderForm={categoryIdx:ci,name:f.name,path:f.path,icon:f.icon||'fa-solid fa-folder',cover:f.cover||''}; 
            this.folderDialogVisible=true; 
        },
        saveFolder() {
            if(!this.folderForm.name.trim()){this.$message.warning(this.t('inputFolderName'));return;}
            if(!this.folderForm.path.trim()){this.$message.warning(this.t('inputFolderPath'));return;}
            const tc=this.folderForm.categoryIdx, fd={name:this.folderForm.name,path:this.folderForm.path,icon:this.folderForm.icon,cover:this.folderForm.cover||''};
            if(this.editingFolderIdx===-1) this.categories[tc].folders.push(fd);
            else { this.categories[this.editingCatIdx_f].folders.splice(this.editingFolderIdx,1); if(tc!==this.editingCatIdx_f) this.categories[tc].folders.push(fd); else this.categories[this.editingCatIdx_f].folders.splice(this.editingFolderIdx,0,fd); }
            this.saveData(); this.renderContent(); this.folderDialogVisible=false; this.$message.success(this.t('saveSuccess'));
        },
        deleteFolder() {
            this.$confirm(this.t('deleteFolderConfirm').replace('{name}', this.categories[this.editingCatIdx_f].folders[this.editingFolderIdx].name),this.t('prompt'),{confirmButtonText:this.t('confirm'),cancelButtonText:this.t('cancel'),type:'warning'}).then(()=>{
                this.categories[this.editingCatIdx_f].folders.splice(this.editingFolderIdx,1); this.saveData(); this.renderContent(); this.folderDialogVisible=false; this.$message.success(this.t('deleteSuccess'));
            });
        },
        confirmDeleteFolder(ci,fi) {
            this.$confirm(this.t('deleteFolderConfirm').replace('{name}', this.categories[ci].folders[fi].name),this.t('prompt'),{confirmButtonText:this.t('confirm'),cancelButtonText:this.t('cancel'),type:'warning'}).then(()=>{
                this.categories[ci].folders.splice(fi,1); this.saveData(); this.renderContent(); this.$message.success(this.t('deleteSuccess'));
            });
        },
        async browseFolder() {
            if('showDirectoryPicker' in window) {
                try { const h=await window.showDirectoryPicker(); this.folderForm.path='[FS]'+h.name; if(!this.folderForm.name.trim()) this.folderForm.name=h.name; } catch(e){}
            } else {
                const inp=document.createElement('input'); inp.type='file'; inp.webkitdirectory=true; inp.nwdirectory=true;
                inp.onchange=()=>{ if(inp.files.length>0){ const n=inp.files[0].webkitRelativePath.split('/')[0]; this.folderForm.path=inp.files[0].path||n; if(!this.folderForm.name.trim()) this.folderForm.name=n; }};
                inp.click();
            }
        },
        uploadCover() {
            this.$refs.coverInput.click();
        },
        handleCoverChange(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                this.$message.warning(this.t('selectImage'));
                return;
            }
            if (file.size > 2 * 1024 * 1024) {
                this.$message.warning(this.t('imageSizeLimit'));
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                this.folderForm.cover = e.target.result;
                this.$message.success(this.t('uploadSuccess'));
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        },
        removeCover() {
            this.folderForm.cover = '';
        },
        openFolder(ci,fi) {
            const p=this.categories[ci].folders[fi].path;
            if(p.startsWith('[FS]')){this.$message.warning(this.t('needReauthorize'));return;}
            const a=document.createElement('a'); a.href='file:///'+p.replace(/\\/g,'/'); a.target='_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        },
        updateScrollSpy() {
            const navs=document.querySelectorAll('#navLinks a'), secs=document.querySelectorAll('.category');
            window.onscroll=()=>{ let c=0; secs.forEach((s,i)=>{if(window.scrollY>=s.offsetTop-120)c=i;}); navs.forEach((a,i)=>a.classList.toggle('active',i===c)); };
        }
    }
});
</script>
