<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileBox - Quick Access</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.13/lib/theme-chalk/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-logo"><i class="fa-solid fa-box-archive"></i> FileBox</div>
        <div class="nav-right">
            <button class="lang-switcher" @click="toggleLang">{{lang==='zh'?'EN':'中文'}}</button>
        </div>
    </nav>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-nav">
                <div class="nav-links" id="navLinks"></div>
            </div>
            <div class="sidebar-bottom">
                <el-button type="primary" size="small" icon="el-icon-plus" @click="openAddCategoryModal">{{t('addCategory')}}</el-button>
            </div>
        </aside>
        <div class="main">
            <div class="page-header">
                <h1>{{t('title')}}</h1>
                <p>{{t('subtitle')}}</p>
            </div>
            <div id="content"></div>
        </div>
    </div>
    <div class="footer">FILEBOX · QUICK ACCESS</div>

    <!-- Category Dialog -->
    <el-dialog :title="categoryDialogTitle" :visible.sync="categoryDialogVisible" width="460px" :close-on-click-modal="false">
        <el-form label-position="top">
            <el-form-item :label="t('categoryName')">
                <el-input v-model="categoryForm.name" :placeholder="t('categoryPlaceholder')"></el-input>
            </el-form-item>
            <el-form-item :label="t('selectIcon')">
                <div class="selected-icon">{{t('selected')}}：<i :class="categoryForm.icon"></i></div>
                <div class="icon-picker">
                    <div v-for="ic in iconList" :key="ic" class="icon-option" :class="{selected:categoryForm.icon===ic}" @click="categoryForm.icon=ic">
                        <i :class="ic"></i>
                    </div>
                </div>
            </el-form-item>
        </el-form>
        <div slot="footer">
            <el-button @click="categoryDialogVisible=false">{{t('cancel')}}</el-button>
            <el-button type="danger" v-if="editingCatIdx!==-1" @click="deleteCategory" style="margin-right:auto">{{t('delete')}}</el-button>
            <el-button type="primary" @click="saveCategory">{{t('save')}}</el-button>
        </div>
    </el-dialog>

    <!-- Folder Dialog -->
    <el-dialog :title="folderDialogTitle" :visible.sync="folderDialogVisible" width="480px" :close-on-click-modal="false">
        <el-form label-position="top">
            <el-form-item :label="t('belongCategory')">
                <el-select v-model="folderForm.categoryIdx" style="width:100%">
                    <el-option v-for="(cat,idx) in categories" :key="idx" :label="cat.category" :value="idx"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item :label="t('folderName')">
                <el-input v-model="folderForm.name" :placeholder="t('folderPlaceholder')"></el-input>
            </el-form-item>
            <el-form-item :label="t('folderPath')">
                <el-input v-model="folderForm.path" :placeholder="t('pathPlaceholder')">
                    <el-button slot="append" @click="browseFolder"><i class="fa-solid fa-folder-open"></i> {{t('browse')}}</el-button>
                </el-input>
                <div style="font-size:12px;color:#909399;margin-top:6px">{{t('pathTip')}}</div>
            </el-form-item>
            <el-form-item :label="t('coverImage')">
                <div class="cover-section">
                    <div class="cover-uploader" @click="uploadCover" v-if="!folderForm.cover">
                        <i class="el-icon-plus"></i>
                    </div>
                    <div style="position:relative;width:100px;height:100px;" v-else>
                        <img :src="folderForm.cover" class="cover-preview">
                        <div class="cover-actions">
                            <button class="cover-action-btn" @click="removeCover" :title="t('delete')"><i class="el-icon-delete"></i></button>
                        </div>
                    </div>
                    <div class="upload-tip">{{t('uploadTip')}}</div>
                </div>
            </el-form-item>
            <el-form-item :label="t('selectIcon')+' ('+t('iconWhenNoCover')+')'">
                <div class="selected-icon">{{t('selected')}}：<i :class="folderForm.icon"></i></div>
                <div class="icon-picker">
                    <div v-for="ic in iconList" :key="ic" class="icon-option" :class="{selected:folderForm.icon===ic}" @click="folderForm.icon=ic">
                        <i :class="ic"></i>
                    </div>
                </div>
            </el-form-item>
        </el-form>
        <div slot="footer">
            <el-button @click="folderDialogVisible=false">{{t('cancel')}}</el-button>
            <el-button type="danger" v-if="editingFolderIdx!==-1" @click="deleteFolder" style="margin-right:auto">{{t('delete')}}</el-button>
            <el-button type="primary" @click="saveFolder">{{t('save')}}</el-button>
        </div>
    </el-dialog>
    <input type="file" ref="coverInput" style="display:none" accept="image/*" @change="handleCoverChange">
</div>

<script src="https://unpkg.com/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://unpkg.com/element-ui@2.15.13/lib/index.js"></script>
<script src="i18n.js"></script>
<script src="icons.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
